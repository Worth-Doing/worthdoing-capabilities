name: openrouter.chat
version: 0.1.0
description: Send chat completions via OpenRouter, accessing 100+ LLM models through a unified API
category: ai
tags:
  - llm
  - chat
  - openrouter
  - ai
  - completion
  - gpt
  - claude

input:
  type: object
  properties:
    model:
      type: string
      description: "Model ID, e.g. openai/gpt-4 or anthropic/claude-3.5-sonnet"
    messages:
      type: array
      description: Array of message objects with role and content
      items:
        type: object
        properties:
          role:
            type: string
          content:
            type: string
    max_tokens:
      type: integer
      description: Maximum number of output tokens
    temperature:
      type: number
      description: Sampling temperature between 0 and 2
    top_p:
      type: number
      description: Nucleus sampling parameter
    stream:
      type: boolean
      description: Enable streaming (default false)
    tools:
      type: array
      description: Function calling tools
    response_format:
      type: object
      description: JSON mode configuration
  required:
    - model
    - messages

output:
  type: object
  properties:
    id:
      type: string
      description: Generation ID
    model:
      type: string
      description: Model used for completion
    content:
      type: string
      description: Response content
    finish_reason:
      type: string
      description: "Reason generation stopped: stop, length, or tool_calls"
    usage:
      type: object
      description: Token counts and cost information
    tool_calls:
      type: array
      description: Tool calls returned by the model (if any)

execution:
  executor: python
  function: worthdoing_capabilities.capabilities.openrouter_chat.handler.execute

auth:
  type: bearer
  env: OPENROUTER_API_KEY

cache:
  enabled: false

retry:
  max_attempts: 2
  backoff: exponential

timeout:
  seconds: 120

planner:
  when_to_use:
    - When the user needs to generate text using a large language model
    - When chat completion from OpenRouter-hosted models is required
    - When accessing GPT, Claude, Llama, Mistral, or other models via a single API
    - When function calling or tool use with an LLM is needed
  when_not_to_use:
    - When a simple web search would suffice
    - When the user only needs to list available models (use openrouter.models instead)
    - When the task does not require language model inference
  latency_hint: high
  cost_hint: medium
