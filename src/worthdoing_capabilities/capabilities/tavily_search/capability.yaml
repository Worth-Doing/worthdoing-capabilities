name: tavily.search
version: 0.1.0
description: Search the web using Tavily AI-powered search API
category: search
tags:
  - search
  - web
  - ai-powered
  - tavily
  - news
  - research

input:
  type: object
  properties:
    query:
      type: string
      description: The search query string
    search_depth:
      type: string
      description: Depth of search - basic is faster, advanced is more thorough
    topic:
      type: string
      description: Category of the search query (general, news, finance)
    max_results:
      type: integer
      description: Maximum number of results to return
    include_answer:
      type: boolean
      description: Whether to include an AI-generated answer summary
    time_range:
      type: string
      description: Time range filter (day, week, month, year)
    include_domains:
      type: array
      description: List of domains to specifically include
    exclude_domains:
      type: array
      description: List of domains to exclude
  required:
    - query

output:
  type: object
  properties:
    query:
      type: string
    answer:
      type: string
    results:
      type: array
    response_time:
      type: number
    total:
      type: integer

execution:
  executor: python
  function: worthdoing_capabilities.capabilities.tavily_search.handler.execute

auth:
  type: bearer
  env: TAVILY_API_KEY

cache:
  enabled: true
  ttl_seconds: 300

retry:
  max_attempts: 2
  backoff: exponential

timeout:
  seconds: 20

planner:
  when_to_use:
    - When the user needs to search the web for current information
    - When AI-powered answer summaries are needed alongside search results
    - When searching for news, research, or finance topics
  when_not_to_use:
    - When the answer is already known
    - When searching internal documents
  latency_hint: medium
  cost_hint: low
