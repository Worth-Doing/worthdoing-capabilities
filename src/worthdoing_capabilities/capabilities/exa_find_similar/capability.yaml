name: exa.find_similar
version: 0.1.0
description: Find web pages similar to a given URL using the Exa API
category: search
tags:
  - web
  - search
  - exa
  - similarity

input:
  type: object
  properties:
    url:
      type: string
      description: The URL to find similar pages for
    num_results:
      type: integer
      description: Number of similar results to return
    exclude_source_domain:
      type: boolean
      description: Whether to exclude results from the same domain as the input URL
  required:
    - url

output:
  type: object
  properties:
    url:
      type: string
    results:
      type: array
    request_id:
      type: string
    total:
      type: integer

execution:
  executor: python
  function: worthdoing_capabilities.capabilities.exa_find_similar.handler.execute

auth:
  type: api_key
  env: EXA_API_KEY

cache:
  enabled: true
  ttl_seconds: 300

retry:
  max_attempts: 2
  backoff: exponential

timeout:
  seconds: 15

planner:
  when_to_use:
    - When the user wants to find pages similar to a specific URL
    - When discovering related content or competitors
    - When expanding research from a known good source
  when_not_to_use:
    - When the user wants a general keyword search
    - When no reference URL is available
  latency_hint: medium
  cost_hint: low
